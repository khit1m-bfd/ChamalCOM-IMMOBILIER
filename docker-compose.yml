version: '3.9'

services:
  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: chamalcom_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-chamalcom}
      POSTGRES_USER: ${DB_USERNAME:-chamalcom_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chamalcom_secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - chamalcom_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-chamalcom_user} -d ${DB_DATABASE:-chamalcom}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis Cache & Sessions
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chamalcom_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-chamalcom_redis}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - chamalcom_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Laravel Backend API
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: chamalcom_backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-chamalcom}
      DB_USERNAME: ${DB_USERNAME:-chamalcom_user}
      DB_PASSWORD: ${DB_PASSWORD:-chamalcom_secret}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-chamalcom_redis}
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chamalcom_network

  # ─────────────────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: chamalcom_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3001}
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      NEXT_PUBLIC_STRIPE_PK: ${STRIPE_PUBLISHABLE_KEY}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - chamalcom_network

  # ─────────────────────────────────────────
  # Socket.io Server (Node.js)
  # ─────────────────────────────────────────
  socketio:
    build:
      context: ./socketio
      dockerfile: Dockerfile
    container_name: chamalcom_socketio
    restart: unless-stopped
    environment:
      PORT: 3001
      REDIS_URL: redis://:${REDIS_PASSWORD:-chamalcom_redis}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    depends_on:
      - redis
    networks:
      - chamalcom_network

  # ─────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: chamalcom_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - chamalcom_network

  # ─────────────────────────────────────────
  # pgAdmin (Dev Only)
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: chamalcom_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@chamalcom.ma}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - chamalcom_network
    profiles:
      - dev

# ─────────────────────────────────────────
# Networks
# ─────────────────────────────────────────
networks:
  chamalcom_network:
    driver: bridge
    name: chamalcom_network

# ─────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
    name: chamalcom_postgres_data
  redis_data:
    name: chamalcom_redis_data
  backend_storage:
    name: chamalcom_backend_storage
  nginx_logs:
    name: chamalcom_nginx_logs
  pgadmin_data:
    name: chamalcom_pgadmin_data
